<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpendSmart – Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f4f1eb; --surface: #ffffff; --border: #e2ddd6;
    --text: #1a1714; --muted: #7a746d; --accent: #2d6a4f;
    --danger: #c0392b; --radius: 14px; --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }

  .wrapper { width: 100%; max-width: 420px; }

  .logo {
    text-align: center; margin-bottom: 2rem;
  }
  .logo h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2rem; letter-spacing: -1px;
  }
  .logo h1 span { color: var(--accent); }
  .logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
  }

  /* Tabs */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 4px; margin-bottom: 1.75rem;
  }
  .tab {
    padding: 8px; text-align: center; font-size: 14px;
    font-weight: 500; cursor: pointer; border-radius: 7px;
    border: none; background: none; color: var(--muted);
    font-family: inherit; transition: all .2s;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  /* Forms */
  .form { display: flex; flex-direction: column; gap: 14px; }
  .form.hidden { display: none; }

  .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
  .field input {
    width: 100%; background: #faf9f6;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 11px 13px; font-size: 15px; font-family: inherit;
    color: var(--text); outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn-main {
    background: var(--text); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 13px; font-size: 15px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    cursor: pointer; width: 100%; margin-top: 4px;
    transition: opacity .2s;
  }
  .btn-main:hover { opacity: .85; }
  .btn-main:disabled { opacity: .5; cursor: not-allowed; }

  .error-msg {
    background: #fdecea; color: var(--danger);
    border: 1px solid #f5c6c2; border-radius: var(--radius-sm);
    padding: 10px 13px; font-size: 13px; display: none;
  }
  .error-msg.show { display: block; }

  .hint { text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.25rem; }
  .hint span { color: var(--accent); cursor: pointer; font-weight: 500; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">
    <h1>Spend<span>Smart</span> 🎓</h1>
    <p>Track your student expenses — together, or solo.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="showTab('login')">Login</button>
      <button class="tab" id="tabRegister" onclick="showTab('register')">Register</button>
    </div>

    <div id="errBox" class="error-msg"></div>

    <!-- Login Form -->
    <div class="form" id="loginForm">
      <div class="field"><label>Username</label><input type="text" id="lUser" placeholder="your username"/></div>
      <div class="field"><label>Password</label><input type="password" id="lPass" placeholder="••••••"/></div>
      <button class="btn-main" id="loginBtn" onclick="doLogin()">Login →</button>
    </div>

    <!-- Register Form -->
    <div class="form hidden" id="registerForm">
      <div class="field"><label>Full Name</label><input type="text" id="rName" placeholder="e.g. Rahul Sharma"/></div>
      <div class="field"><label>Username</label><input type="text" id="rUser" placeholder="choose a username"/></div>
      <div class="field"><label>Password</label><input type="password" id="rPass" placeholder="min. 4 characters"/></div>
      <button class="btn-main" id="registerBtn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>

  <p class="hint" id="hintText">
    New here? <span onclick="showTab('register')">Create a free account</span>
  </p>
</div>

<script>
function showTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
  document.getElementById('registerForm').classList.toggle('hidden', isLogin);
  document.getElementById('hintText').innerHTML = isLogin
    ? `New here? <span onclick="showTab('register')">Create a free account</span>`
    : `Already have one? <span onclick="showTab('login')">Login</span>`;
  hideErr();
}

function showErr(msg) {
  const b = document.getElementById('errBox');
  b.textContent = msg; b.classList.add('show');
}
function hideErr() { document.getElementById('errBox').classList.remove('show'); }

async function doLogin() {
  hideErr();
  const username = document.getElementById('lUser').value.trim();
  const password = document.getElementById('lPass').value;
  if (!username || !password) { showErr('Please fill in both fields.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';

  const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Login →';

  if (!res.ok) { showErr(data.error); return; }
  window.location.href = '/';
}

async function doRegister() {
  hideErr();
  const name     = document.getElementById('rName').value.trim();
  const username = document.getElementById('rUser').value.trim();
  const password = document.getElementById('rPass').value;
  if (!name || !username || !password) { showErr('All fields are required.'); return; }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating…';

  const res  = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, username, password}) });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Create Account →';

  if (!res.ok) { showErr(data.error); return; }
  window.location.href = '/';
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('loginForm').classList.contains('hidden')) doLogin();
  else doRegister();
});
</script>
</body>
</html>
