<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpendSmart – Login</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060810;color:#e8eaf0;min-height:100vh;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;padding:2rem;overflow-x:hidden;}
.bg-canvas{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 80% 60% at 50% -10%,rgba(74,222,128,.18) 0%,transparent 70%),
  radial-gradient(ellipse 60% 50% at 80% 50%,rgba(99,102,241,.15) 0%,transparent 60%),
  radial-gradient(ellipse 50% 60% at 10% 80%,rgba(16,185,129,.10) 0%,transparent 60%),#060810;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.2;animation:float 10s ease-in-out infinite;pointer-events:none;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#4ade80,transparent);top:-150px;left:-100px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#6366f1,transparent);bottom:-100px;right:-100px;animation-delay:-5s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(74,222,128,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(74,222,128,.04) 1px,transparent 1px);background-size:50px 50px;}
.back-btn{position:fixed;top:1.5rem;left:2rem;z-index:200;display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#7a7f94;
  padding:9px 18px;border-radius:999px;font-size:14px;text-decoration:none;transition:all .2s;font-family:inherit;}
.back-btn:hover{background:rgba(255,255,255,.12);color:#e8eaf0;border-color:rgba(74,222,128,.3);}
.wrapper{width:100%;max-width:780px;position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:2.5rem;}
.logo h1{font-family:'Space Grotesk',sans-serif;font-size:3.6rem;letter-spacing:-2px;color:#e8eaf0;}
.logo h1 span{color:#4ade80;}
.logo p{color:#7a7f94;font-size:18px;margin-top:10px;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:3.5rem;}
/* Tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:#0d0f1a;border-radius:14px;padding:6px;margin-bottom:2.5rem;}
.tab{padding:15px;text-align:center;font-size:18px;font-weight:500;cursor:pointer;border-radius:10px;
  border:none;background:none;color:#5a5f78;font-family:inherit;transition:all .25s;}
.tab:hover{color:#e8eaf0;}
.tab.active{background:#1e2235;color:#e8eaf0;box-shadow:0 2px 8px rgba(0,0,0,.4);}
/* Panel visibility */
.panel{display:none;flex-direction:column;gap:20px;}
.panel.active{display:flex;}
/* Fields */
.field{display:flex;flex-direction:column;gap:8px;}
.field label{font-size:15px;color:#7a7f94;font-weight:500;}
.field input{background:#0d0f1a;border:1px solid #2e3347;border-radius:12px;
  padding:16px 18px;font-size:17px;font-family:inherit;color:#e8eaf0;outline:none;transition:border-color .2s;}
.field input:focus{border-color:#4ade80;}
.field input::placeholder{color:#3a3f52;}
/* OTP row */
.otp-row{display:flex;gap:10px;}
.otp-row input{flex:1;}
.btn-otp{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:#4ade80;
  padding:16px 20px;border-radius:10px;font-size:15px;font-weight:600;
  font-family:'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.btn-otp:hover{background:rgba(74,222,128,.22);}
.btn-otp:disabled{opacity:.5;cursor:not-allowed;}
.otp-verified{display:none;align-items:center;gap:8px;font-size:15px;color:#4ade80;
  background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:14px 16px;}
.otp-verified.show{display:flex;}
/* Buttons */
.btn-main{background:linear-gradient(135deg,#4ade80,#22c55e);color:#0f1117;border:none;
  border-radius:12px;padding:18px;font-size:19px;font-family:'Space Grotesk',sans-serif;
  font-weight:700;cursor:pointer;width:100%;transition:all .2s;}
.btn-main:hover{opacity:.9;transform:translateY(-1px);}
.btn-main:active{transform:scale(.98);}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;}
/* Messages */
.msg{border-radius:10px;padding:13px 16px;font-size:15px;display:none;margin-bottom:4px;}
.msg.show{display:block;}
.msg.err{background:#2b0d0d;color:#f87171;border:1px solid #4d1a1a;}
.msg.ok{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.2);}
/* Forgot */
.forgot-link{text-align:right;}
.forgot-link span{color:#4ade80;font-size:14px;cursor:pointer;}
.forgot-link span:hover{opacity:.7;}
.back-link{background:none;border:none;color:#7a7f94;font-size:14px;cursor:pointer;
  font-family:inherit;display:flex;align-items:center;gap:5px;padding:0;}
.back-link:hover{color:#4ade80;}
.reset-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:#e8eaf0;}
.reset-sub{font-size:14px;color:#7a7f94;}
/* Hint */
.hint{text-align:center;font-size:16px;color:#7a7f94;margin-top:1.5rem;}
.hint span{color:#4ade80;cursor:pointer;font-weight:600;}
.features{display:flex;justify-content:center;gap:24px;margin-top:2rem;flex-wrap:wrap;}
.feature{display:flex;align-items:center;gap:7px;font-size:14px;color:#4a4f64;}
.feature-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;}
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="bg-grid"></div>
<a href="/home" class="back-btn">← Home</a>

<div class="wrapper">
  <div class="logo">
    <h1>Spend<span>Smart</span> 🎓</h1>
    <p>Your personal student expense tracker</p>
  </div>

  <div class="card">
    <!-- Tabs (hidden when forgot panel is open) -->
    <div class="tabs" id="tabsBar">
      <button class="tab active" id="tabLogin" onclick="showTab('login')">Login</button>
      <button class="tab" id="tabRegister" onclick="showTab('register')">Register</button>
    </div>

    <!-- Messages -->
    <div id="msgBox" class="msg"></div>

    <!-- ── LOGIN PANEL ── -->
    <div class="panel active" id="loginPanel">
      <div class="field">
        <label>Username or Email</label>
        <input type="text" id="lUser" placeholder="username or email@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="lPass" placeholder="••••••"/>
      </div>
      <div class="forgot-link"><span onclick="showForgot()">Forgot password?</span></div>
      <button class="btn-main" id="loginBtn" onclick="doLogin()">Login →</button>
    </div>

    <!-- ── REGISTER PANEL ── -->
    <div class="panel" id="registerPanel">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="rName" placeholder="e.g. Rahul Sharma"/>
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="rUser" placeholder="choose a username"/>
      </div>
      <div class="field">
        <label>Email Address</label>
        <div class="otp-row">
          <input type="email" id="rEmail" placeholder="you@example.com"/>
          <button class="btn-otp" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
        </div>
      </div>
      <div class="field" id="otpField" style="display:none">
        <label>Enter OTP <span style="color:#5a5f78;font-weight:400">(check your email)</span></label>
        <div class="otp-row">
          <input type="text" id="rOtp" placeholder="6-digit code" maxlength="6"/>
          <button class="btn-otp" id="verifyOtpBtn" onclick="verifyOTP()">Verify</button>
        </div>
      </div>
      <div class="otp-verified" id="otpVerified">✓ Email verified!</div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="rPass" placeholder="min. 4 characters"/>
      </div>
      <button class="btn-main" id="registerBtn" onclick="doRegister()">Create Account →</button>
    </div>

    <!-- ── FORGOT PASSWORD PANEL ── -->
    <div class="panel" id="forgotPanel">
      <button class="back-link" onclick="hideForgot()">← Back to Login</button>
      <div class="reset-title">Reset Password</div>
      <div class="reset-sub">Enter your registered email to get an OTP</div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="fEmail" placeholder="your@email.com"/>
      </div>
      <button class="btn-otp" id="fSendBtn" onclick="sendResetOTP()" style="width:100%">Send Reset OTP</button>
      <div class="field" id="fOtpField" style="display:none">
        <label>Enter OTP</label>
        <div class="otp-row">
          <input type="text" id="fOtp" placeholder="6-digit code" maxlength="6"/>
          <button class="btn-otp" onclick="verifyResetOTP()">Verify</button>
        </div>
      </div>
      <div class="field" id="fPassField" style="display:none">
        <label>New Password</label>
        <input type="password" id="fNewPass" placeholder="min. 4 characters"/>
      </div>
      <button class="btn-main" id="fResetBtn" onclick="doResetPassword()" style="display:none">Reset Password →</button>
    </div>
  </div>

  <p class="hint" id="hintText">New here? <span onclick="showTab('register')">Create a free account</span></p>

  <div class="features">
    <div class="feature"><div class="feature-dot"></div>Budget Tracking</div>
    <div class="feature"><div class="feature-dot"></div>Smart Insights</div>
    <div class="feature"><div class="feature-dot"></div>CSV Export</div>
    <div class="feature"><div class="feature-dot"></div>Dark Mode</div>
  </div>
</div>

<script>
let otpVerifiedFlag = false;
let resetVerified   = false;

// ── Tab switching ───────────────────────────────────────
function showTab(tab){
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  showPanel(isLogin ? 'loginPanel' : 'registerPanel');
  document.getElementById('hintText').innerHTML = isLogin
    ? `New here? <span onclick="showTab('register')">Create a free account</span>`
    : `Already have one? <span onclick="showTab('login')">Login</span>`;
  clearMsg();
}

function showPanel(id){
  ['loginPanel','registerPanel','forgotPanel'].forEach(p=>{
    document.getElementById(p).classList.toggle('active', p===id);
  });
}

// ── Messages ────────────────────────────────────────────
function showMsg(msg, type='err'){
  const b = document.getElementById('msgBox');
  b.textContent = msg;
  b.className = `msg show ${type}`;
}
function clearMsg(){ document.getElementById('msgBox').className = 'msg'; }

// ── Login ───────────────────────────────────────────────
async function doLogin(){
  clearMsg();
  const username = document.getElementById('lUser').value.trim();
  const password = document.getElementById('lPass').value;
  if(!username||!password){ showMsg('Please fill in both fields.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='Logging in…';
  const res  = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data = await res.json();
  btn.disabled=false; btn.textContent='Login →';
  if(!res.ok){ showMsg(data.error); return; }
  window.location.href='/';
}

// ── Register ────────────────────────────────────────────
async function sendOTP(){
  clearMsg();
  const email = document.getElementById('rEmail').value.trim();
  if(!email||!email.includes('@')){ showMsg('Enter a valid email address.'); return; }
  const btn = document.getElementById('sendOtpBtn');
  btn.disabled=true; btn.textContent='Sending…';
  const res  = await fetch('/api/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  const data = await res.json();
  btn.disabled=false; btn.textContent='Resend';
  if(!res.ok){ showMsg(data.error); return; }
  document.getElementById('otpField').style.display='flex';
  if(data.dev_otp) showMsg(`Dev mode OTP: ${data.dev_otp}`,'ok');
  else showMsg(`OTP sent to ${email}!`,'ok');
}

async function verifyOTP(){
  clearMsg();
  const email = document.getElementById('rEmail').value.trim();
  const otp   = document.getElementById('rOtp').value.trim();
  if(otp.length!==6){ showMsg('Enter the 6-digit OTP.'); return; }
  const btn = document.getElementById('verifyOtpBtn');
  btn.disabled=true; btn.textContent='Verifying…';
  const res  = await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})});
  const data = await res.json();
  btn.disabled=false;
  if(!res.ok){ showMsg(data.error); return; }
  otpVerifiedFlag=true;
  document.getElementById('otpField').style.display='none';
  document.getElementById('otpVerified').classList.add('show');
  document.getElementById('rEmail').disabled=true;
  document.getElementById('sendOtpBtn').style.display='none';
  clearMsg();
}

async function doRegister(){
  clearMsg();
  const name=document.getElementById('rName').value.trim();
  const username=document.getElementById('rUser').value.trim();
  const email=document.getElementById('rEmail').value.trim();
  const password=document.getElementById('rPass').value;
  if(!name||!username||!email||!password){ showMsg('All fields are required.'); return; }
  if(!otpVerifiedFlag){ showMsg('Please verify your email with OTP first.'); return; }
  const btn=document.getElementById('registerBtn');
  btn.disabled=true; btn.textContent='Creating…';
  const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,username,email,password})});
  const data=await res.json();
  btn.disabled=false; btn.textContent='Create Account →';
  if(!res.ok){ showMsg(data.error); return; }
  window.location.href='/';
}

// ── Forgot Password ─────────────────────────────────────
function showForgot(){
  document.getElementById('tabsBar').style.display='none';
  document.getElementById('hintText').style.display='none';
  showPanel('forgotPanel');
  clearMsg();
}
function hideForgot(){
  document.getElementById('tabsBar').style.display='grid';
  document.getElementById('hintText').style.display='block';
  showPanel('loginPanel');
  document.getElementById('tabLogin').classList.add('active');
  document.getElementById('tabRegister').classList.remove('active');
  clearMsg();
}

async function sendResetOTP(){
  clearMsg();
  const email=document.getElementById('fEmail').value.trim();
  if(!email||!email.includes('@')){ showMsg('Enter a valid email address.'); return; }
  const btn=document.getElementById('fSendBtn');
  btn.disabled=true; btn.textContent='Sending…';
  const res=await fetch('/api/send-reset-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  const data=await res.json();
  btn.disabled=false; btn.textContent='Resend OTP';
  if(!res.ok){ showMsg(data.error); return; }
  document.getElementById('fOtpField').style.display='flex';
  if(data.dev_otp) showMsg(`Dev OTP: ${data.dev_otp}`,'ok');
  else showMsg(`OTP sent to ${email}!`,'ok');
}

async function verifyResetOTP(){
  clearMsg();
  const email=document.getElementById('fEmail').value.trim();
  const otp=document.getElementById('fOtp').value.trim();
  if(otp.length!==6){ showMsg('Enter 6-digit OTP.'); return; }
  const res=await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})});
  const data=await res.json();
  if(!res.ok){ showMsg(data.error); return; }
  resetVerified=true;
  document.getElementById('fOtpField').style.display='none';
  document.getElementById('fPassField').style.display='flex';
  document.getElementById('fResetBtn').style.display='block';
  document.getElementById('fSendBtn').style.display='none';
  showMsg('Email verified! Enter your new password.','ok');
}

async function doResetPassword(){
  clearMsg();
  const email=document.getElementById('fEmail').value.trim();
  const pass=document.getElementById('fNewPass').value;
  if(!pass||pass.length<4){ showMsg('Password must be at least 4 characters.'); return; }
  const btn=document.getElementById('fResetBtn');
  btn.disabled=true; btn.textContent='Resetting…';
  const res=await fetch('/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
  const data=await res.json();
  btn.disabled=false; btn.textContent='Reset Password →';
  if(!res.ok){ showMsg(data.error); return; }
  showMsg('Password reset successfully! Redirecting…','ok');
  setTimeout(()=>hideForgot(), 1500);
}

// Enter key
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  if(document.getElementById('loginPanel').classList.contains('active')) doLogin();
  else if(document.getElementById('registerPanel').classList.contains('active')) doRegister();
});
</script>
</body>
</html>
